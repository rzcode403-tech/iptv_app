name: iptv_pro
description: Professional IPTV Player Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Video Player
  video_player: ^2.8.1
  chewie: ^1.7.4
  
  # State Management
  provider: ^6.1.1
  
  # Network & HTTP
  http: ^1.1.0
  dio: ^5.4.0
  
  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & Design
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  
  # Icons & Assets
  flutter_svg: ^2.0.9
  
  # Utils
  uuid: ^4.3.3
  path_provider: ^2.1.2
  connectivity_plus: ^5.0.2
  
  # M3U Parser
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
